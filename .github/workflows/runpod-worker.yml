name: Build RunPod worker image

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  # Scope by event so a push event (which is always skipped unless the commit
  # message tags [build-runpod]) cannot cancel an in-flight workflow_dispatch
  # build mid-export.
  group: runpod-worker-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    # Skip on push events unless the commit message contains [build-runpod].
    # workflow_dispatch always runs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[build-runpod]')

    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./runpod-worker.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/comfyui-worker:latest
            ghcr.io/${{ github.repository_owner }}/comfyui-worker:${{ github.sha }}
          secrets: |
            hf_token=${{ secrets.HF_TOKEN }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-worker:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-worker:buildcache,mode=max

      - name: Image summary
        run: |
          {
            echo "### RunPod worker image"
            echo '```'
            echo "ghcr.io/${{ github.repository_owner }}/comfyui-worker:latest"
            echo "ghcr.io/${{ github.repository_owner }}/comfyui-worker:${{ github.sha }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
